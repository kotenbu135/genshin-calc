  publish-npm:
    name: Publish to npm
    needs: [validate, test, clippy, fmt]
    runs-on: ubuntu-latest
    if: needs.validate.outputs.dry_run == 'false'
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --scope kotenbu135

      - name: Copy extra files
        run: cp crates/wasm/ts/types.ts crates/wasm/pkg/types.ts

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        run: npm publish --access public --provenance
        working-directory: crates/wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

